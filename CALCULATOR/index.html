<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CALC MK II</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="machine">

  <!-- Brand -->
  <div class="brand">CALC · MK II</div>

  <!-- Display -->
  <div class="display-shell">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="btn-grid">

    <!-- Row 1 -->
    <button class="btn clear" data-action="clear">AC</button>
    <button class="btn" data-action="delete">DEL</button>
    <button class="btn" data-action="sign">+/−</button>
    <button class="btn op" data-op="/">÷</button>

    <!-- Row 2 -->
    <button class="btn" data-num="7">7</button>
    <button class="btn" data-num="8">8</button>
    <button class="btn" data-num="9">9</button>
    <button class="btn op" data-op="*">×</button>

    <!-- Row 3 -->
    <button class="btn" data-num="4">4</button>
    <button class="btn" data-num="5">5</button>
    <button class="btn" data-num="6">6</button>
    <button class="btn op" data-op="-">−</button>

    <!-- Row 4 -->
    <button class="btn" data-num="1">1</button>
    <button class="btn" data-num="2">2</button>
    <button class="btn" data-num="3">3</button>
    <button class="btn op" data-op="+">+</button>

    <!-- Row 5 -->
    <button class="btn op" data-op="%">%</button>
    <button class="btn" data-num="0">0</button>
    <button class="btn" data-action="decimal">.</button>
    <button class="btn eq" data-action="equals">=</button>

    <!-- Row 6 (Power) -->
    <button class="btn op wide" data-op="**">x<sup>y</sup></button>

  </div>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
